<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caminhada</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>⛪ Caminhada</h1>
    <p>Disciplina • Fé • Evolução diária</p>

    <div class="card">
      <h2>💰 Controle de Dívidas</h2>
      <input id="divida" placeholder="Nome da dívida">
      <input id="valor" placeholder="Valor">
      <button onclick="addDivida()">Registrar pagamento</button>
      <ul id="listaDividas"></ul>
    </div>

    <div class="card">
      <h2>⏳ Jejum</h2>
      <button onclick="iniciarJejum()">Iniciar jejum</button>
      <p id="jejumStatus">Nenhum jejum ativo</p>
    </div>

    <div class="card">
      <h2>🧠 Disciplina do Dia</h2>
      <button onclick="concluirDisciplina()">Marcar concluído</button>
      <p id="disciplinaStatus">Ainda não concluído</p>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
